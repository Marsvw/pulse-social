<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulse — Translation Classroom</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400&family=Nunito:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FDFCF8;--fg:#2C2C24;--primary:#5D7052;--primary-fg:#F3F4F1;
  --secondary:#C18C5D;--accent:#E6DCCD;--accent-fg:#4A4A40;
  --muted:#F0EBE5;--muted-fg:#78786C;--border:#DED8CF;
  --destructive:#A85448;--card-bg:#FEFEFA;--max-w:820px;
  --shadow-soft:0 4px 20px -2px rgba(93,112,82,0.15);
  --shadow-float:0 10px 40px -10px rgba(193,140,93,0.2);
  --radius:1rem;--radius-lg:2rem;--radius-xl:3rem;
}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:var(--fg);
  min-height:100vh;line-height:1.6;position:relative;
}
/* Grain texture overlay */
body::after{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
  opacity:0.035;mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
a{color:var(--primary);text-decoration:none;transition:color .3s}
a:hover{color:var(--secondary)}
::selection{background:var(--primary);color:var(--primary-fg)}
input,textarea,button,select{font-family:'Nunito',sans-serif;border-radius:9999px !important}
textarea{border-radius:var(--radius-lg) !important}
h1,h2,h3,h4{font-family:'Fraunces',serif;color:var(--fg);line-height:1.2}
</style>
</head>
<body>
<style>
/* ── NAV (floating pill glassmorphism) ── */
nav{position:sticky;top:12px;z-index:100;max-width:var(--max-w);margin:0 auto;padding:0 20px}
.nav-pill{background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:9999px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:var(--shadow-soft);transition:all .3s}
.nav-pill:hover{box-shadow:var(--shadow-float)}
.nav-brand{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:800;cursor:pointer;color:var(--primary);transition:color .3s}
.nav-brand:hover{color:var(--secondary)}
.nav-sub{font-family:'Nunito',sans-serif;font-size:.65rem;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.15em;margin-left:10px;display:none}
@media(min-width:600px){.nav-sub{display:inline}}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-links button{background:none;border:2px solid var(--primary);color:var(--primary);padding:6px 16px;font-family:'Nunito',sans-serif;font-size:.75rem;cursor:pointer;transition:all .3s;font-weight:700;border-radius:9999px}
.nav-links button:hover{background:var(--primary);color:var(--primary-fg);transform:scale(1.05)}
.nav-links button:active{transform:scale(0.95)}
.nav-links .btn-accent{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
.nav-links .btn-accent:hover{background:var(--secondary);border-color:var(--secondary);transform:scale(1.05)}
.nav-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 12px;border:2px solid var(--border);border-radius:9999px;transition:all .3s}
.nav-user:hover{background:var(--primary);border-color:var(--primary);transform:scale(1.05)}
.nav-user:hover .nav-avatar{background:var(--primary-fg);color:var(--primary)}
.nav-user:hover .nav-username{color:var(--primary-fg)}
.nav-avatar{width:28px;height:28px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--primary-fg);font-family:'Nunito',sans-serif;transition:all .3s;border-radius:6px;object-fit:cover}
.nav-username{font-family:'Nunito',sans-serif;font-size:.75rem;color:var(--fg);font-weight:600;transition:color .3s}

/* ── MAIN ── */
main{max-width:var(--max-w);margin:0 auto;padding:30px 20px 80px;min-height:calc(100vh - 200px)}

/* ── TABS ── */
.tab-bar{display:flex;gap:6px;margin-bottom:24px;padding:6px;background:var(--muted);border-radius:9999px}
.tab{font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;padding:10px 20px;cursor:pointer;border:none;background:transparent;color:var(--muted-fg);transition:all .3s;border-radius:9999px;position:relative}
.tab:hover{color:var(--fg);background:rgba(255,255,255,0.5)}
.tab.active{color:var(--primary-fg);background:var(--primary);box-shadow:var(--shadow-soft)}
.tab-badge{background:var(--secondary);color:white;font-size:.55rem;padding:1px 6px;margin-left:6px;font-weight:700;border-radius:9999px;vertical-align:middle}
/* ── CARDS ── */
.card{background:var(--card-bg);border:1px solid rgba(222,216,207,0.5);padding:24px;margin-bottom:16px;position:relative;transition:all .3s;border-radius:var(--radius-lg);box-shadow:var(--shadow-soft)}
.card-hover:hover{box-shadow:var(--shadow-float);transform:translateY(-2px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .4s ease-out}

/* ── CATEGORY BADGE ── */
.cat-badge{font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:4px 12px;display:inline-block;margin-bottom:10px;border-radius:9999px}
.cat-material{background:rgba(93,112,82,0.12);color:var(--primary)}
.cat-assignment{background:rgba(193,140,93,0.12);color:var(--secondary)}
.cat-discussion{background:var(--muted);color:var(--muted-fg)}

/* ── FORMS ── */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:'Nunito',sans-serif;font-size:.7rem;color:var(--muted-fg);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 20px;background:rgba(255,255,255,0.5);border:2px solid var(--border);color:var(--fg);font-family:'Nunito',sans-serif;font-size:.85rem;outline:none;transition:all .3s;resize:vertical}
.form-group select{cursor:pointer}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(93,112,82,0.15);background:white}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--muted-fg);font-family:'Nunito',sans-serif}
/* ── BUTTONS ── */
.btn{padding:10px 24px;border:2px solid var(--primary);font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .3s;background:transparent;color:var(--primary);border-radius:9999px}
.btn:hover{transform:scale(1.05);box-shadow:var(--shadow-soft)}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--primary);color:var(--primary-fg);border-color:var(--primary);box-shadow:0 4px 20px -2px rgba(93,112,82,0.25)}
.btn-primary:hover{background:#4a5d42;border-color:#4a5d42;box-shadow:0 6px 24px -4px rgba(93,112,82,0.35);transform:scale(1.05)}
.btn-danger{background:transparent;color:var(--destructive);border-color:var(--destructive)}
.btn-danger:hover{background:var(--destructive);color:white;transform:scale(1.05)}
.btn-ghost{background:transparent;color:var(--fg);border-color:var(--border)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);background:rgba(93,112,82,0.06)}
.btn-sm{padding:6px 14px;font-size:.7rem}
.error-msg{color:var(--destructive);font-family:'Nunito',sans-serif;font-size:.8rem;margin-top:8px;font-weight:700}

/* ── AUTH ── */
.auth-wrap{max-width:420px;margin:40px auto}
.auth-wrap h2{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:800;line-height:1.1;color:var(--fg);margin-bottom:4px}
.auth-wrap p.sub{color:var(--muted-fg);margin-bottom:28px;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:600}
.auth-footer{text-align:center;margin-top:20px;font-family:'Nunito',sans-serif;font-size:.8rem;color:var(--muted-fg)}
/* ── POST CARD ── */
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.post-avatar{width:36px;height:36px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--primary-fg);font-family:'Nunito',sans-serif;flex-shrink:0;border-radius:8px;object-fit:cover;transition:all .3s}
.post-meta{flex:1}
.post-author{font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;color:var(--fg);transition:color .3s}
.post-author:hover{color:var(--primary)}
.post-time{font-family:'Nunito',sans-serif;font-size:.65rem;color:var(--muted-fg)}
.post-title{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;margin-bottom:8px;line-height:1.25;color:var(--fg)}
.post-body{color:var(--accent-fg);font-size:.9rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-family:'Nunito','Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif}
.post-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;color:var(--primary);border:2px solid var(--primary);padding:6px 16px;transition:all .3s;border-radius:9999px}
.post-link:hover{background:var(--primary);color:var(--primary-fg);text-decoration:none;transform:scale(1.05)}
.post-divider{border:none;border-top:1px solid var(--border);margin:16px 0 12px;opacity:0.5}
.post-actions{display:flex;gap:16px;align-items:center}
.post-action{background:none;border:none;color:var(--muted-fg);font-family:'Nunito',sans-serif;font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .3s;font-weight:600;border-radius:9999px;padding:4px 10px}
.post-action:hover{color:var(--primary);background:rgba(93,112,82,0.06)}
.post-action.liked{color:var(--destructive);font-weight:700;background:rgba(168,84,72,0.06)}
/* ── COMMENTS ── */
.comments-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.comment{padding:10px 0;border-bottom:1px solid rgba(222,216,207,0.4)}
.comment:last-child{border-bottom:none}
.comment-author{font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;color:var(--fg)}
.comment-body{font-size:.85rem;color:var(--accent-fg);margin-top:3px;line-height:1.5}
.comment-time{font-family:'Nunito',sans-serif;font-size:.6rem;color:var(--muted-fg);margin-top:2px}
.comment-form{display:flex;gap:8px;margin-top:10px}
.comment-form input{flex:1;padding:10px 16px;background:rgba(255,255,255,0.5);border:2px solid var(--border);color:var(--fg);font-family:'Nunito',sans-serif;font-size:.8rem;outline:none;transition:all .3s}
.comment-form input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(93,112,82,0.15);background:white}
.comment-delete{background:none;border:none;color:var(--muted-fg);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.65rem;float:right;transition:color .3s;font-weight:600}
.comment-delete:hover{color:var(--destructive)}

/* ── COMPOSE ── */
.compose-label{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--primary);color:var(--primary)}
/* ── PROFILE ── */
.profile-header{text-align:center;padding:30px 20px;border-bottom:2px solid var(--border);margin-bottom:24px}
.profile-avatar{width:80px;height:80px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;color:var(--primary-fg);font-family:'Fraunces',serif;margin:0 auto 16px;border-radius:12px;object-fit:cover;transition:all .3s}
.profile-name{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:800;color:var(--fg)}
.profile-username{font-family:'Nunito',sans-serif;color:var(--muted-fg);font-size:.8rem;margin-top:2px;font-weight:600}
.profile-bio{color:var(--accent-fg);font-size:.9rem;margin-top:12px;max-width:400px;margin-left:auto;margin-right:auto;line-height:1.6;font-style:italic}
.profile-joined{font-family:'Nunito',sans-serif;color:var(--muted-fg);font-size:.7rem;margin-top:10px;font-weight:600}

/* ── ADMIN ── */
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);margin-bottom:24px;gap:12px}
.stat-card{padding:24px;text-align:center;background:var(--card-bg);border:1px solid rgba(222,216,207,0.5);border-radius:var(--radius-lg);box-shadow:var(--shadow-soft);transition:all .3s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-float)}
.stat-num{font-family:'Fraunces',serif;font-size:2.5rem;font-weight:800;color:var(--primary);transition:transform .3s}
.stat-card:hover .stat-num{transform:scale(1.1)}
.stat-label{font-family:'Nunito',sans-serif;font-size:.65rem;color:var(--muted-fg);margin-top:4px;text-transform:uppercase;letter-spacing:.15em;font-weight:700}
.admin-table{width:100%;border-collapse:separate;border-spacing:0}
.admin-table th{text-align:left;font-family:'Nunito',sans-serif;font-size:.65rem;color:var(--muted-fg);padding:10px 12px;border-bottom:2px solid var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.admin-table td{padding:12px;border-bottom:1px solid rgba(222,216,207,0.4);font-family:'Nunito',sans-serif;font-size:.8rem}
.badge{padding:3px 10px;font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-radius:9999px}
.badge-admin{background:var(--primary);color:var(--primary-fg)}
.badge-active{background:rgba(93,112,82,0.12);color:var(--primary)}
.badge-disabled{background:rgba(168,84,72,0.12);color:var(--destructive)}

/* ── MISC ── */
.page-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:800;margin-bottom:4px;color:var(--fg)}
.page-subtitle{font-family:'Nunito',sans-serif;font-size:.7rem;color:var(--muted-fg);font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--primary)}
.ornament{padding:20px 0;text-align:center;font-size:1.4rem;color:var(--border);letter-spacing:.6em}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted-fg);font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:600}
.empty-state span{display:block;font-size:2.5rem;margin-bottom:10px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,44,36,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg);border:1px solid var(--border);padding:28px;width:100%;max-width:440px;animation:fadeUp .3s ease-out;border-radius:var(--radius-lg);box-shadow:var(--shadow-float)}
.modal h3{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;margin-bottom:16px;color:var(--primary)}
/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--primary-fg);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;padding:12px 28px;z-index:300;animation:toastIn .3s ease-out;border-radius:9999px;box-shadow:var(--shadow-float)}
.toast-success{background:var(--primary)}
.toast-error{background:var(--destructive)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(20px)}}

/* ── BLOB BACKGROUNDS ── */
.blob{position:absolute;border-radius:60% 40% 30% 70%/60% 30% 70% 40%;filter:blur(60px);opacity:0.12;pointer-events:none;z-index:-1}
.blob-1{width:300px;height:300px;background:var(--primary);top:-60px;right:-80px}
.blob-2{width:250px;height:250px;background:var(--secondary);bottom:-40px;left:-60px}

/* ── CURRICULUM ── */
.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px}
.level-card{background:var(--card-bg);border:2px solid var(--border);padding:24px;cursor:pointer;transition:all .3s;border-radius:var(--radius-lg);text-align:center;box-shadow:var(--shadow-soft)}
.level-card:hover{border-color:var(--primary);box-shadow:var(--shadow-float);transform:translateY(-3px)}
.level-card.active{border-color:var(--primary);background:rgba(93,112,82,0.06)}
.level-id{font-family:'Fraunces',serif;font-size:2rem;font-weight:800;color:var(--primary);margin-bottom:4px}
.level-name{font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;color:var(--fg);margin-bottom:8px}
.level-desc{font-family:'Nunito',sans-serif;font-size:.7rem;color:var(--muted-fg);line-height:1.4}
.level-progress{margin-top:10px;font-family:'Nunito',sans-serif;font-size:.65rem;color:var(--primary);font-weight:700}
.week-card{background:var(--card-bg);border:1px solid rgba(222,216,207,0.5);padding:20px;margin-bottom:12px;border-radius:var(--radius-lg);box-shadow:var(--shadow-soft);transition:all .3s}
.week-card:hover{box-shadow:var(--shadow-float)}
.week-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;color:var(--fg);margin-bottom:8px}
.week-num{font-family:'Nunito',sans-serif;font-size:.6rem;font-weight:700;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.1em}
.progress-bar{height:6px;background:var(--muted);border-radius:9999px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:9999px;transition:width .4s ease}
.day-list{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.day-btn{width:40px;height:40px;border:2px solid var(--border);background:transparent;border-radius:50%;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .3s;color:var(--fg);display:flex;align-items:center;justify-content:center}
.day-btn:hover{border-color:var(--primary);color:var(--primary);transform:scale(1.1)}
.day-btn.completed{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
.day-btn.completed:hover{background:#4a5d42}
.lesson-section{background:var(--card-bg);border:1px solid rgba(222,216,207,0.5);padding:24px;margin-bottom:16px;border-radius:var(--radius-lg);box-shadow:var(--shadow-soft)}
.lesson-section h3{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:12px}
.vocab-grid{display:flex;flex-wrap:wrap;gap:8px}
.vocab-chip{background:rgba(93,112,82,0.08);color:var(--primary);padding:6px 14px;border-radius:9999px;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:600}
.example-row{padding:10px 0;border-bottom:1px solid rgba(222,216,207,0.3)}
.example-row:last-child{border-bottom:none}
.example-en{font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;color:var(--fg)}
.example-es{font-family:'Nunito',sans-serif;font-size:.8rem;color:var(--muted-fg);font-style:italic;margin-top:2px}
.tip-box{background:rgba(193,140,93,0.1);border:2px solid rgba(193,140,93,0.25);padding:16px 20px;border-radius:var(--radius-lg);margin-bottom:16px}
.tip-box p{font-family:'Nunito',sans-serif;font-size:.8rem;color:var(--secondary);font-weight:600;line-height:1.5}
.flashcard-container{perspective:800px;margin:0 auto 16px;max-width:380px}
.flashcard{position:relative;width:100%;height:200px;cursor:pointer;transition:transform .6s;transform-style:preserve-3d}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;border-radius:var(--radius-lg);border:2px solid var(--border);font-family:'Nunito',sans-serif}
.flashcard-front{background:var(--card-bg);color:var(--fg)}
.flashcard-back{background:var(--primary);color:var(--primary-fg);transform:rotateY(180deg)}
.flashcard-text{font-size:1.3rem;font-weight:700;text-align:center;line-height:1.3}
.flashcard-hint{font-size:.7rem;color:var(--muted-fg);margin-top:10px;font-weight:600}
.flashcard-nav{display:flex;justify-content:center;gap:12px;align-items:center;margin-top:12px}
.flashcard-counter{font-family:'Nunito',sans-serif;font-size:.8rem;color:var(--muted-fg);font-weight:600}

  nav{top:8px;padding:0 12px}

  .auth-wrap h2{font-size:1.8rem}
  .post-title{font-size:1.1rem}
  .tab{padding:8px 12px;font-size:.65rem}

</style>

<!-- Ambient blob backgrounds -->
<div style="position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none;z-index:-1">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div style="position:absolute;width:200px;height:200px;background:var(--accent);border-radius:30% 70% 70% 30%/30% 30% 70% 70%;filter:blur(80px);opacity:0.1;top:40%;left:50%"></div>
</div>

<nav>
  <div class="nav-pill">
    <div style="display:flex;align-items:baseline">
      <div class="nav-brand" onclick="navigate('feed')">Pulse</div>
      <span class="nav-sub">Translation Classroom</span>
    </div>
    <div class="nav-links" id="navLinks"></div>
  </div>
</nav>

<main id="app"></main>

<footer style="border-top:2px solid var(--border);padding:32px 20px;text-align:center;margin-top:40px;background:var(--muted)">
  <div style="font-family:'Fraunces',serif;font-size:1.3rem;font-weight:800;margin-bottom:6px;color:var(--primary)">Pulse</div>
  <div style="font-family:'Nunito',sans-serif;font-size:.7rem;color:var(--muted-fg);font-weight:600">
    Translation Classroom &nbsp;&middot;&nbsp; Est. 2026
  </div>
  <div style="margin-top:8px;font-size:.6rem;color:var(--muted-fg);font-family:'Nunito',sans-serif">Made with care for learning</div>
</footer>

<script>

/* ═══ STATE ═══ */
const S = { token: localStorage.getItem('token'), user: null, page: 'feed', pageArg: null, activeTab: 'material' };
const postCache = {}; /* stores post data by id for safe edit modal access */

/* ═══ API ═══ */
const api = async (path, opts = {}) => {
  const h = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (S.token) h['Authorization'] = 'Bearer ' + S.token;
  const r = await fetch(path, { ...opts, headers: h });
  if (r.status === 204) return null;
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || 'Request failed');
  return data;
};

/* ═══ NAV ═══ */
function updateNav() {
  const nl = document.getElementById('navLinks');
  if (S.user) {
    nl.innerHTML = `
      <button onclick="navigate('feed')">Feed</button>
      <button onclick="navigate('curriculum')">Learn</button>
      ${S.user.is_admin ? '<button onclick="navigate(\'admin\')">Admin</button>' : ''}
      <div class="nav-user" onclick="navigate('profile',S.user.username)">
        ${avatarHtml(S.user.avatar_url, S.user.display_name || S.user.username, 'nav-avatar')}
        <span class="nav-username">${S.user.username}</span>
      </div>
      <button onclick="logout()">Log out</button>`;
  } else {
    nl.innerHTML = `<button onclick="navigate('login')">Sign In</button><button class="btn-accent" onclick="navigate('register')">Register</button>`;
  }
}

/* ═══ TOAST ═══ */
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'success');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.animation = 'toastOut .3s ease-out forwards'; setTimeout(() => el.remove(), 300); }, 2500);
}

/* ═══ LOADING HELPER ═══ */
async function withLoading(btnSelector, fn) {
  const btn = typeof btnSelector === 'string' ? document.querySelector(btnSelector) : btnSelector;
  if (!btn) return fn();
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = 'WAIT...'; btn.style.opacity = '0.6';
  try { await fn(); } finally { btn.disabled = false; btn.innerHTML = orig; btn.style.opacity = '1'; }
}

/* ═══ AUTH ═══ */
function logout() { S.token = null; S.user = null; localStorage.removeItem('token'); updateNav(); navigate('login'); }

async function loadMe() {
  if (!S.token) return;
  try { S.user = await api('/api/auth/me'); } catch { logout(); }
}

/* ═══ ROUTER ═══ */
function navigate(page, arg) {
  S.page = page; S.pageArg = arg || null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  updateNav();
  const app = document.getElementById('app');
  switch (S.page) {
    case 'feed': return renderFeed(app);
    case 'login': return renderLogin(app);
    case 'register': return renderRegister(app);
    case 'profile': return renderProfile(app);
    case 'edit-profile': return renderEditProfile(app);
    case 'admin': return renderAdmin(app);
    case 'curriculum': return renderCurriculum(app);
    case 'lesson': return renderLesson(app);
    case 'flashcards': return renderFlashcards(app);
    case 'quiz': return renderQuiz(app);
    default: return renderFeed(app);
  }
}

/* ═══ LOGIN ═══ */
function renderLogin(app) {
  app.innerHTML = `<div class="auth-wrap">
    <h2>Sign In</h2><p class="sub">Translation Classroom</p>
    <div class="form-group"><label>Username</label><input id="lUser" placeholder="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="form-group"><label>Password</label><input id="lPass" type="password" placeholder="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="lErr"></div>
    <button id="loginBtn" class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">Enter</button>
    <p class="auth-footer">No account? <a href="#" onclick="navigate('register');return false" style="text-decoration:underline">Register</a></p>
  </div>`;
}

async function doLogin() {
  const user = document.getElementById('lUser').value.trim();
  const pass = document.getElementById('lPass').value;
  const err = document.getElementById('lErr');
  if (!user) { err.innerHTML = '<p class="error-msg">Username is required</p>'; return; }
  if (!pass) { err.innerHTML = '<p class="error-msg">Password is required</p>'; return; }
  await withLoading('#loginBtn', async () => {
    try {
      const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ username: user, password: pass }) });
      S.token = res.access_token; localStorage.setItem('token', S.token);
      await loadMe(); navigate('feed');
    } catch (e) { err.innerHTML = `<p class="error-msg">${e.message}</p>`; }
  });
}

/* ═══ REGISTER ═══ */
function renderRegister(app) {
  app.innerHTML = `<div class="auth-wrap">
    <h2>Register</h2><p class="sub">Join the Classroom</p>
    <div class="form-group"><label>Username</label><input id="rUser" placeholder="username" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <div class="form-group"><label>Email</label><input id="rEmail" placeholder="email@example.com" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <div class="form-group"><label>Display Name</label><input id="rName" placeholder="your name" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <div class="form-group"><label>Password</label><input id="rPass" type="password" placeholder="password" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <div id="rErr"></div>
    <button id="regBtn" class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doRegister()">Create Account</button>
    <p class="auth-footer">Have an account? <a href="#" onclick="navigate('login');return false" style="text-decoration:underline">Sign in</a></p>
  </div>`;
}

async function doRegister() {
  const user = document.getElementById('rUser').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const name = document.getElementById('rName').value.trim();
  const pass = document.getElementById('rPass').value;
  const err = document.getElementById('rErr');
  if (!user) { err.innerHTML = '<p class="error-msg">Username is required</p>'; return; }
  if (user.length < 3) { err.innerHTML = '<p class="error-msg">Username must be at least 3 characters</p>'; return; }
  if (!email || !email.includes('@')) { err.innerHTML = '<p class="error-msg">Valid email is required</p>'; return; }
  if (!pass) { err.innerHTML = '<p class="error-msg">Password is required</p>'; return; }
  if (pass.length < 4) { err.innerHTML = '<p class="error-msg">Password must be at least 4 characters</p>'; return; }
  await withLoading('#regBtn', async () => {
    try {
      await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ username: user, email, display_name: name || user, password: pass }) });
      const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ username: user, password: pass }) });
      S.token = res.access_token; localStorage.setItem('token', S.token);
      await loadMe(); navigate('feed');
    } catch (e) { err.innerHTML = `<p class="error-msg">${e.message}</p>`; }
  });
}

/* ═══ FEED (tabbed: Materials / Assignments / Discussion) ═══ */
function renderFeed(app) {
  const tabs = [
    { key: 'all', label: 'All' },
    { key: 'material', label: 'Materials' },
    { key: 'assignment', label: 'Assignments' },
    { key: 'discussion', label: 'Discussion' },
  ];
  const tabHtml = tabs.map(t =>
    `<button class="tab ${S.activeTab === t.key ? 'active' : ''}" onclick="S.activeTab='${t.key}';renderFeed(document.getElementById('app'))">${t.label}</button>`
  ).join('');

  const showCompose = S.user && S.activeTab !== 'all' && (S.activeTab !== 'material' || S.user.is_admin);

  app.innerHTML = `
    <div class="tab-bar">${tabHtml}</div>
    <div style="margin-bottom:16px"><input id="feedSearch" placeholder="Search posts..." style="width:100%;padding:10px 20px;border:2px solid var(--border);background:rgba(255,255,255,0.5);color:var(--fg);font-family:'Nunito',sans-serif;font-size:.85rem;outline:none;border-radius:9999px;transition:all .3s" oninput="filterFeedPosts()" onfocus="this.style.borderColor='var(--primary)';this.style.boxShadow='0 0 0 3px rgba(93,112,82,0.15)'" onblur="this.style.borderColor='var(--border)';this.style.boxShadow='none'"></div>
    ${showCompose ? `<div class="card" style="margin-bottom:24px">
      <div class="compose-label">New ${S.activeTab === 'material' ? 'Material' : S.activeTab === 'assignment' ? 'Assignment' : 'Discussion'}</div>
      <div class="form-group"><label>Title</label><input id="cTitle" placeholder="title"></div>
      <div class="form-group"><label>Content</label><textarea id="cBody" rows="3" placeholder="write something..."></textarea></div>
      <div class="form-group"><label>Link / Video URL (optional)</label><input id="cLink" placeholder="https://..."></div>
      <div style="text-align:right"><button class="btn btn-primary" onclick="submitPost()">Publish</button></div>
      <div id="cErr"></div>
    </div>` : ''}
    ${!S.user ? '<div style="margin-bottom:20px;font-family:Inter,sans-serif;font-size:.75rem;color:var(--n500);text-transform:uppercase;letter-spacing:.1em"><a href="#" onclick="navigate(\'login\');return false" style="text-decoration:underline">Sign in</a> to post and interact</div>' : ''}
    <div id="postsContainer"><div class="empty-state"><span>&#8987;</span>Loading...</div></div>`;
  loadPosts();
}

let feedPosts = [];

async function loadPosts() {
  const c = document.getElementById('postsContainer');
  try {
    const url = S.activeTab === 'all' ? '/api/posts/' : `/api/posts/?category=${S.activeTab}`;
    feedPosts = await api(url);
    renderFilteredPosts();
  } catch (e) { c.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

function renderFilteredPosts() {
  const c = document.getElementById('postsContainer');
  if (!c) return;
  const search = (document.getElementById('feedSearch')?.value || '').toLowerCase().trim();
  const filtered = search ? feedPosts.filter(p =>
    p.title.toLowerCase().includes(search) ||
    p.body.toLowerCase().includes(search) ||
    p.author_username.toLowerCase().includes(search) ||
    (p.author_display_name || '').toLowerCase().includes(search)
  ) : feedPosts;
  if (!filtered.length) {
    c.innerHTML = search
      ? `<div class="empty-state"><span>&#128269;</span>No posts matching "${esc(search)}"</div>`
      : `<div class="empty-state"><span>&#9744;</span>No ${S.activeTab === 'material' ? 'materials' : S.activeTab === 'assignment' ? 'assignments' : 'posts'} yet</div>`;
    return;
  }
  c.innerHTML = filtered.map(postCard).join('') + '<div class="ornament">&#x2766;</div>';
}

function filterFeedPosts() { renderFilteredPosts(); }

async function submitPost() {
  const title = document.getElementById('cTitle').value.trim();
  const body = document.getElementById('cBody').value.trim();
  const link_url = document.getElementById('cLink').value.trim() || null;
  if (!title || !body) { document.getElementById('cErr').innerHTML = '<p class="error-msg">Title and content required</p>'; return; }
  try {
    await api('/api/posts/', { method: 'POST', body: JSON.stringify({ title, body, category: S.activeTab, link_url }) });
    toast('Published!');
    renderFeed(document.getElementById('app'));
  } catch (e) { document.getElementById('cErr').innerHTML = `<p class="error-msg">${e.message}</p>`; }
}

/* ═══ POST CARD ═══ */
function postCard(p) {
  postCache[p.id] = p; /* cache for safe edit modal access */
  const authorName = p.author_display_name || p.author_username;
  const catClass = p.category === 'material' ? 'cat-material' : p.category === 'assignment' ? 'cat-assignment' : 'cat-discussion';
  const catLabel = p.category === 'material' ? 'Material' : p.category === 'assignment' ? 'Assignment' : 'Discussion';
  const linkHtml = p.link_url ? `<a href="${esc(p.link_url)}" target="_blank" rel="noopener" class="post-link">&#9654; Open Link</a>` : '';
  const canEdit = S.user && (S.user.id === p.author_id || S.user.is_admin);
  const ago = timeAgo(p.created_at);

  return `<div class="card card-hover" id="post-${p.id}">
    <span class="cat-badge ${catClass}">${catLabel}</span>
    <div class="post-header">
      ${avatarHtml(p.author_avatar_url, authorName, 'post-avatar')}
      <div class="post-meta">
        <span class="post-author" onclick="navigate('profile','${p.author_username}')">${esc(authorName)}</span>
        <div class="post-time">${ago}</div>
      </div>
      ${canEdit ? `<button class="btn btn-sm btn-ghost" onclick="openEditModal(${p.id})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deletePost(${p.id})">Del</button>` : ''}
    </div>
    <div class="post-title">${esc(p.title)}</div>
    <div class="post-body">${formatBody(p.body)}</div>
    ${linkHtml}
    <hr class="post-divider">
    <div class="post-actions">
      <button class="post-action ${p.liked_by_me ? 'liked' : ''}" onclick="toggleLike(${p.id})">&#9829; ${p.like_count}</button>
      <button class="post-action" onclick="toggleComments(${p.id})">&#9998; ${p.comment_count} comments</button>
    </div>
    <div id="comments-${p.id}" style="display:none">${renderComments(p)}</div>
  </div>`;
}

/* ═══ COMMENTS ═══ */
function renderComments(p) {
  const list = (p.comments || []).map(c => `<div class="comment">
    ${S.user && (S.user.id === c.author_id || S.user.is_admin) ? `<button class="comment-delete" onclick="deleteComment(${p.id},${c.id})">&#x2715;</button>` : ''}
    <span class="comment-author">${esc(c.author_username)}</span>
    <div class="comment-body">${esc(c.body)}</div>
    <div class="comment-time">${timeAgo(c.created_at)}</div>
  </div>`).join('');
  const form = S.user ? `<div class="comment-form"><input id="ci-${p.id}" placeholder="add a comment..." onkeydown="if(event.key==='Enter')addComment(${p.id})"><button class="btn btn-sm btn-primary" onclick="addComment(${p.id})">Send</button></div>` : '';
  return `<div class="comments-section">${list}${form}</div>`;
}

function toggleComments(postId) {
  const el = document.getElementById('comments-' + postId);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function refreshPostComments(postId) {
  try {
    const post = await api(`/api/posts/${postId}`);
    postCache[postId] = post;
    const commentsDiv = document.getElementById('comments-' + postId);
    if (commentsDiv) {
      commentsDiv.innerHTML = renderComments(post);
      commentsDiv.style.display = 'block';
    }
    /* Update comment count button */
    const postEl = document.getElementById('post-' + postId);
    if (postEl) {
      const btns = postEl.querySelectorAll('.post-action');
      if (btns[1]) btns[1].innerHTML = `&#9998; ${post.comment_count} comments`;
    }
  } catch (e) { alert(e.message); }
}

async function addComment(postId) {
  const input = document.getElementById('ci-' + postId);
  if (!input.value.trim()) return;
  try {
    await api(`/api/posts/${postId}/comments`, { method: 'POST', body: JSON.stringify({ body: input.value.trim() }) });
    await refreshPostComments(postId);
  } catch (e) { alert(e.message); }
}

async function deleteComment(postId, commentId) {
  if (!confirm('Delete comment?')) return;
  try {
    await api(`/api/posts/${postId}/comments/${commentId}`, { method: 'DELETE' });
    await refreshPostComments(postId);
  } catch (e) { alert(e.message); }
}

/* ═══ LIKES ═══ */
async function toggleLike(postId) {
  if (!S.user) { navigate('login'); return; }
  try {
    const res = await api(`/api/posts/${postId}/like`, { method: 'POST' });
    /* Update just the like button in-place */
    if (postCache[postId]) {
      postCache[postId].liked_by_me = res.liked;
      postCache[postId].like_count = res.like_count;
    }
    const postEl = document.getElementById('post-' + postId);
    if (postEl) {
      const likeBtn = postEl.querySelector('.post-action');
      if (likeBtn) {
        likeBtn.className = 'post-action' + (res.liked ? ' liked' : '');
        likeBtn.innerHTML = `&#9829; ${res.like_count}`;
      }
    }
  } catch (e) { alert(e.message); }
}

/* ═══ EDIT / DELETE POST ═══ */
async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  try { await api(`/api/posts/${id}`, { method: 'DELETE' }); renderFeed(document.getElementById('app')); } catch (e) { alert(e.message); }
}

function openEditModal(id) {
  const p = postCache[id];
  if (!p) return;
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'editModal';
  modal.innerHTML = `<div class="modal">
    <h3>Edit Post</h3>
    <div class="form-group"><label>Title</label><input id="eTitle"></div>
    <div class="form-group"><label>Content</label><textarea id="eBody" rows="4"></textarea></div>
    <div class="form-group"><label>Link URL</label><input id="eLink"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-ghost" onclick="document.getElementById('editModal').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit(${id})">Save</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  /* Set values safely via DOM instead of inline interpolation */
  document.getElementById('eTitle').value = p.title;
  document.getElementById('eBody').value = p.body;
  document.getElementById('eLink').value = p.link_url || '';
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

async function saveEdit(id) {
  try {
    const payload = {
      title: document.getElementById('eTitle').value,
      body: document.getElementById('eBody').value,
      link_url: document.getElementById('eLink').value.trim() || null,
    };
    await api(`/api/posts/${id}`, { method: 'PATCH', body: JSON.stringify(payload) });
    document.getElementById('editModal').remove();
    toast('Post updated!');
    renderFeed(document.getElementById('app'));
  } catch (e) { alert(e.message); }
}

/* ═══ PROFILE ═══ */
async function renderProfile(app) {
  const username = S.pageArg;
  app.innerHTML = '<div class="empty-state"><span>&#8987;</span>Loading...</div>';
  try {
    const [user, posts] = await Promise.all([api(`/api/users/${username}`), api(`/api/users/${username}/posts`)]);
    const isMe = S.user && S.user.id === user.id;
    const joined = new Date(user.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long' });

    app.innerHTML = `<div class="profile-header">
      ${avatarHtml(user.avatar_url, user.display_name || user.username, 'profile-avatar')}
      <div class="profile-name">${esc(user.display_name || user.username)}</div>
      <div class="profile-username">@${esc(user.username)} ${user.is_admin ? '<span class="badge badge-admin">Teacher</span>' : ''}</div>
      ${user.bio ? `<div class="profile-bio">${esc(user.bio)}</div>` : ''}
      <div class="profile-joined">Joined ${joined}</div>
      ${isMe ? '<button class="btn btn-sm" style="margin-top:12px" onclick="navigate(\'edit-profile\')">Edit Profile</button>' : ''}
    </div>
    <h2 class="page-title" style="margin-top:24px">Posts</h2>
    <div class="page-subtitle">${posts.length} contribution${posts.length !== 1 ? 's' : ''}</div>
    ${posts.length ? posts.map(postCard).join('') : '<div class="empty-state"><span>&#9744;</span>No posts yet</div>'}`;
  } catch (e) { app.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

/* ═══ EDIT PROFILE ═══ */
function renderEditProfile(app) {
  if (!S.user) { navigate('login'); return; }
  const currentAvatar = S.user.avatar_url;
  app.innerHTML = `<div class="auth-wrap">
    <h2>Edit Profile</h2><p class="sub">Update your details</p>
    <div style="text-align:center;margin-bottom:20px">
      <div id="avatarPreview">${avatarHtml(currentAvatar, S.user.display_name || S.user.username, 'profile-avatar')}</div>

function previewAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    document.getElementById('avatarMsg').innerHTML = '<p class="error-msg">Image must be under 5MB</p>';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('avatarPreview').innerHTML = `<img src="${e.target.result}" class="profile-avatar" style="object-fit:cover">`;
  };
  reader.readAsDataURL(file);
  /* Upload immediately */
  uploadAvatar(file);
}

async function uploadAvatar(file) {
  const msg = document.getElementById('avatarMsg');
  msg.innerHTML = '<p style="color:var(--muted-fg);font-size:.75rem">Uploading...</p>';
  try {
    const form = new FormData();
    form.append('file', file);
    const h = {};
    if (S.token) h['Authorization'] = 'Bearer ' + S.token;
    const r = await fetch('/api/users/me/avatar', { method: 'POST', headers: h, body: form });
    const text = await r.text();
    let data;
    try { data = JSON.parse(text); } catch { throw new Error('Server error: ' + text.substring(0, 100)); }
    if (!r.ok) throw new Error(data.detail || 'Upload failed');
    S.user = data;
    msg.innerHTML = '<p style="color:var(--primary);font-size:.75rem;font-weight:700">Photo updated!</p>';
    updateNav();
  } catch (e) {
    msg.innerHTML = `<p class="error-msg">${e.message}</p>`;
  }
}

async function removeAvatar() {
  try {
    S.user = await api('/api/users/me', { method: 'PATCH', body: JSON.stringify({ avatar_url: null }) });
    toast('Photo removed');
    updateNav();
    renderEditProfile(document.getElementById('app'));
  } catch (e) { toast(e.message, 'error'); }
}

async function saveProfile() {
  try {
    const payload = {
      display_name: document.getElementById('epName').value,
      bio: document.getElementById('epBio').value,
    };
    S.user = await api('/api/users/me', { method: 'PATCH', body: JSON.stringify(payload) });
    toast('Profile updated!');
    navigate('profile', S.user.username);
  } catch (e) { document.getElementById('epErr').innerHTML = `<p class="error-msg">${e.message}</p>`; }
}

async function changePassword() {
  const cur = document.getElementById('epCurPass').value;
  const nw = document.getElementById('epNewPass').value;
  const msg = document.getElementById('epPassMsg');
  if (!cur || !nw) { msg.innerHTML = '<p class="error-msg">Both fields required</p>'; return; }
  if (nw.length < 4) { msg.innerHTML = '<p class="error-msg">New password must be at least 4 characters</p>'; return; }
  try {
    await api('/api/auth/change-password', { method: 'POST', body: JSON.stringify({ current_password: cur, new_password: nw }) });
    toast('Password changed!');
    msg.innerHTML = '';
    document.getElementById('epCurPass').value = '';
    document.getElementById('epNewPass').value = '';
  } catch (e) { msg.innerHTML = `<p class="error-msg">${e.message}</p>`; }
}

/* ═══ UTILS ═══ */
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatBody(text) {
  if (!text) return '';
  let s = esc(text);
  /* Auto-link URLs */
  s = s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="text-decoration:underline;text-decoration-color:var(--accent)">$1</a>');
  /* **bold** */
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  /* *italic* */
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return s;
}

function avatarHtml(url, name, cssClass) {
  const cls = cssClass || 'post-avatar';
  if (url) return `<img src="${esc(url)}" alt="${esc(name)}" class="${cls}" style="object-fit:cover">`;
  const initial = (name || '?')[0].toUpperCase();
  return `<div class="${cls}">${initial}</div>`;
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}

async function renderFlashcards(app) {
  const parts = S.pageArg ? S.pageArg.split('/') : [];
  if (parts.length < 3) { navigate('curriculum'); return; }
  const [levelId, week, day] = parts;

    fcCards = lesson.flashcards || [];

    app.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <button class="btn btn-sm btn-ghost" onclick="navigate('lesson','${S.pageArg}')">← Back to Lesson</button>

        </div>
      </div>
      <div id="fcArea"></div>`;
    renderFlashcard();
  } catch(e) { app.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

function renderFlashcard() {
  const area = document.getElementById('fcArea');
  if (!area || !fcCards.length) return;
  const card = fcCards[fcIndex];
  area.innerHTML = `
    <div class="flashcard-container">
      <div class="flashcard ${fcFlipped ? 'flipped' : ''}" onclick="fcFlip()">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-text">${esc(card.front)}</div>
          <div class="flashcard-hint">Tap to reveal</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-text">${esc(card.back)}</div>
        </div>
      </div>
    </div>
    <div class="flashcard-nav">
      <button class="btn btn-sm btn-ghost" onclick="fcPrev()" ${fcIndex === 0 ? 'disabled' : ''}>← Prev</button>
      <span class="flashcard-counter">${fcIndex + 1} / ${fcCards.length}</span>
      <button class="btn btn-sm btn-ghost" onclick="fcNext()" ${fcIndex === fcCards.length - 1 ? 'disabled' : ''}>Next →</button>
    </div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-sm" onclick="fcShuffle()">🔀 Shuffle</button>
    </div>`;
}

function fcFlip() { fcFlipped = !fcFlipped; renderFlashcard(); }
function fcPrev() { if (fcIndex > 0) { fcIndex--; fcFlipped = false; renderFlashcard(); } }
function fcNext() { if (fcIndex < fcCards.length - 1) { fcIndex++; fcFlipped = false; renderFlashcard(); } }
function fcShuffle() {
  for (let i = fcCards.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [fcCards[i],fcCards[j]] = [fcCards[j],fcCards[i]]; }
  fcIndex = 0; fcFlipped = false; renderFlashcard(); toast('Shuffled!');
}

/* ═══ QUIZ ═══ */
let quizQs = [], quizAnswers = [], quizCurrent = 0, quizSubmitted = false;

async function renderQuiz(app) {
  const parts = S.pageArg ? S.pageArg.split('/') : [];
  if (parts.length < 3) { navigate('curriculum'); return; }
  const [levelId, week, day] = parts;
  try {
    const lesson = await api(`/api/curriculum/lesson/${levelId}/${week}/${day}`);
    quizQs = lesson.quiz || [];
    quizAnswers = new Array(quizQs.length).fill(-1);
    quizCurrent = 0; quizSubmitted = false;
    app.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap">
        <button class="btn btn-sm btn-ghost" onclick="navigate('lesson','${S.pageArg}')">← Back to Lesson</button>
        <div>
          <span class="cat-badge cat-assignment">${levelId.toUpperCase()} W${week}D${day}</span>
          <h2 class="page-title" style="margin-top:6px">📋 Quiz: ${esc(lesson.topic)}</h2>
        </div>
      </div>
      <div id="quizArea"></div>`;
    renderQuizQuestion();
  } catch(e) { app.innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

function renderQuizQuestion() {
  const area = document.getElementById('quizArea');
  if (!area) return;
  if (quizSubmitted) return;

  const q = quizQs[quizCurrent];
  area.innerHTML = `
    <div class="lesson-section">
      <div style="font-family:'Nunito',sans-serif;font-size:.7rem;color:var(--muted-fg);font-weight:700;margin-bottom:8px">Question ${quizCurrent + 1} of ${quizQs.length}</div>
      <div class="quiz-question">${esc(q.q)}</div>
      ${q.options.map((opt, i) => `<button class="quiz-option ${quizAnswers[quizCurrent] === i ? 'selected' : ''}" onclick="quizSelect(${i})">${esc(opt)}</button>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px">
      <button class="btn btn-sm btn-ghost" onclick="quizPrev()" ${quizCurrent === 0 ? 'disabled style="visibility:hidden"' : ''}>← Previous</button>
      ${quizCurrent < quizQs.length - 1
        ? `<button class="btn btn-sm btn-primary" onclick="quizNext()">Next →</button>`
        : `<button class="btn btn-primary" onclick="quizSubmit()">Submit Quiz</button>`
      }
    </div>
    <div style="display:flex;gap:6px;justify-content:center;margin-top:16px">
      ${quizQs.map((_, i) => `<div style="width:10px;height:10px;border-radius:50%;background:${quizAnswers[i] >= 0 ? 'var(--primary)' : 'var(--border)'};cursor:pointer" onclick="quizCurrent=${i};renderQuizQuestion()"></div>`).join('')}
    </div>`;
}

function quizSelect(i) { quizAnswers[quizCurrent] = i; renderQuizQuestion(); }
function quizPrev() { if (quizCurrent > 0) { quizCurrent--; renderQuizQuestion(); } }
function quizNext() { if (quizCurrent < quizQs.length - 1) { quizCurrent++; renderQuizQuestion(); } }

async function quizSubmit() {
  if (quizAnswers.some(a => a < 0)) { toast('Please answer all questions', 'error'); return; }
  const parts = S.pageArg.split('/');
  const [levelId, week, day] = parts;
  try {
    const res = await api(`/api/curriculum/quiz/${levelId}/${week}/${day}`, {
      method: 'POST', body: JSON.stringify({answers: quizAnswers})
    });
    quizSubmitted = true;
    const area = document.getElementById('quizArea');
    const pct = Math.round(res.score / res.total * 100);
    const emoji = pct === 100 ? '🎉' : pct >= 67 ? '👍' : '📚';
    area.innerHTML = `
      <div class="quiz-result">
        <div style="font-size:3rem;margin-bottom:8px">${emoji}</div>
        <div class="quiz-score">${res.score} / ${res.total}</div>
        <div style="font-family:'Nunito',sans-serif;font-size:.85rem;color:var(--muted-fg);margin-top:8px;font-weight:600">${pct}% correct</div>
        <div style="margin-top:16px">
          ${res.results.map((r, i) => {
            const q = quizQs[i];
            return `<div style="text-align:left;padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;color:${r.correct ? 'var(--primary)' : 'var(--destructive)'}">${r.correct ? '✓' : '✗'} ${esc(q.q)}</div>
              <div style="font-family:'Nunito',sans-serif;font-size:.75rem;color:var(--muted-fg);margin-top:2px">Your answer: ${esc(q.options[r.user_answer])} ${r.correct ? '' : '→ Correct: ' + esc(q.options[r.correct_answer])}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="navigate('lesson','${S.pageArg}')">← Back to Lesson</button>
        <button class="btn btn-primary" onclick="navigate('curriculum')">Curriculum</button>
      </div>`;
  } catch(e) { toast(e.message, 'error'); }
}

/* ═══ INIT ═══ */
(async () => {
  await loadMe();
  navigate('feed');
})();
</script>
</body>
