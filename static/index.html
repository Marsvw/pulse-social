<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --surface-alt: #f4f5f7;
  --border: #e8e8ec;
  --border-light: #f0f0f3;
  --text: #1a1a2e;
  --text-secondary: #6b7084;
  --text-muted: #9ca0b0;
  --accent: #2d6a4f;
  --accent-light: #d8f3dc;
  --accent-hover: #1b4332;
  --red: #d64045;
  --red-light: #fde8e8;
  --blue: #3a86ff;
  --blue-light: #e8f0fe;
  --amber: #e5a100;
  --amber-light: #fef3cd;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --nav-h: 64px;
}

html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Nav */
nav {
  position: sticky; top: 0; z-index: 100;
  height: var(--nav-h);
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.nav-brand {
  font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px;
  color: var(--accent);
  display: flex; align-items: center; gap: 8px;
}
.nav-links { display: flex; gap: 4px; }
.nav-links button {
  background: none; border: none; cursor: pointer;
  padding: 8px 14px; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.9rem; font-weight: 500;
  color: var(--text-secondary); transition: all 0.15s;
}
.nav-links button:hover { background: var(--surface-alt); color: var(--text); }
.nav-links button.active { background: var(--accent-light); color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-user { font-size: 0.85rem; color: var(--text-secondary); }
.btn-logout {
  background: none; border: 1px solid var(--border); cursor: pointer;
  padding: 6px 14px; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.82rem; color: var(--text-secondary); transition: all 0.15s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Auth */
.auth-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e9f0 100%);
}
.auth-card {
  background: var(--surface); border-radius: 16px; padding: 48px;
  box-shadow: var(--shadow-lg); width: 100%; max-width: 420px;
}
.auth-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
.auth-card .subtitle { color: var(--text-secondary); margin-bottom: 28px; font-size: 0.92rem; }
.auth-card label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
.auth-card input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.95rem;
  margin-bottom: 16px; transition: border-color 0.15s; outline: none;
}
.auth-card input:focus { border-color: var(--accent); }
.auth-card .toggle { text-align: center; margin-top: 20px; font-size: 0.88rem; color: var(--text-secondary); }
.auth-card .toggle a { color: var(--accent); cursor: pointer; text-decoration: none; font-weight: 500; }
.auth-card .toggle a:hover { text-decoration: underline; }
.auth-error { color: var(--red); font-size: 0.85rem; margin-bottom: 12px; }

/* Buttons */
.btn-primary {
  background: var(--accent); color: #fff; border: none; cursor: pointer;
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.92rem; font-weight: 600;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary {
  background: var(--surface); color: var(--text); border: 1px solid var(--border); cursor: pointer;
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-family: var(--font); font-size: 0.92rem; font-weight: 500;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-secondary:hover { border-color: var(--text-muted); background: var(--surface-alt); }
.btn-sm { padding: 6px 12px; font-size: 0.82rem; }
.btn-danger { background: var(--red); color: #fff; border: none; cursor: pointer; padding: 6px 12px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.82rem; }
.btn-danger:hover { opacity: 0.9; }

/* Cards & Stats */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.stat-card .stat-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .stat-value { font-size: 1.8rem; font-weight: 700; letter-spacing: -1px; margin: 4px 0; font-family: var(--mono); }
.stat-card .stat-sub { font-size: 0.82rem; color: var(--text-secondary); }
.stat-positive { color: var(--accent); }
.stat-negative { color: var(--red); }
.stat-neutral { color: var(--text); }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-header h2 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; padding: 10px 14px; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
tbody td { padding: 12px 14px; font-size: 0.9rem; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
tbody tr:hover { background: var(--surface-alt); }
.amount-positive { color: var(--accent); font-weight: 600; font-family: var(--mono); font-size: 0.88rem; }
.amount-negative { color: var(--red); font-weight: 600; font-family: var(--mono); font-size: 0.88rem; }
.category-tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; background: var(--surface-alt); color: var(--text-secondary); }
.cat-Groceries { background: #e8f5e9; color: #2e7d32; }
.cat-Dining { background: #fff3e0; color: #e65100; }
.cat-Shopping { background: #e3f2fd; color: #1565c0; }
.cat-Subscriptions { background: #f3e5f5; color: #7b1fa2; }
.cat-Income { background: var(--accent-light); color: var(--accent); }
.cat-Transfer { background: #e0f2f1; color: #00695c; }
.cat-Utilities { background: #eceff1; color: #37474f; }
.cat-Housing { background: #fce4ec; color: #ad1457; }
.cat-Transport { background: #e8eaf6; color: #283593; }
.cat-Entertainment { background: #fff8e1; color: #f57f17; }
.cat-Health { background: #e8f5e9; color: #1b5e20; }
.cat-Insurance { background: #efebe9; color: #4e342e; }
.cat-GasAuto { background: #fff3e0; color: #bf360c; }

/* Charts */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.chart-card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; }
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 0.82rem; width: 120px; text-align: right; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 24px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; min-width: 2px; }
.bar-value { font-size: 0.8rem; font-family: var(--mono); color: var(--text-secondary); width: 80px; }

/* Upload */
.upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: var(--accent-light); }
.upload-zone .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
.upload-zone p { color: var(--text-secondary); font-size: 0.92rem; }
.upload-zone .upload-formats { font-size: 0.8rem; color: var(--text-muted); margin-top: 8px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal { background: var(--surface); border-radius: 16px; padding: 32px; box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
.modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
.modal label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
.modal input, .modal select, .modal textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.92rem; margin-bottom: 14px; outline: none; transition: border-color 0.15s; }
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

/* Subscriptions */
.sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.sub-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; justify-content: space-between; align-items: center; }
.sub-info h4 { font-size: 0.95rem; font-weight: 600; }
.sub-info p { font-size: 0.82rem; color: var(--text-secondary); }
.sub-amount { font-family: var(--mono); font-weight: 700; font-size: 1.1rem; color: var(--red); }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.empty-state h3 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 0.9rem; max-width: 400px; margin: 0 auto 20px; }

/* Filters */
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.filters input, .filters select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font); font-size: 0.88rem; outline: none; }
.filters input:focus, .filters select:focus { border-color: var(--accent); }

/* Accounts */
.accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.account-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.account-card .acct-type { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); font-weight: 600; }
.account-card .acct-name { font-size: 1.05rem; font-weight: 600; margin: 4px 0; }
.account-card .acct-inst { font-size: 0.85rem; color: var(--text-secondary); }
.account-card .acct-balance { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; margin-top: 12px; }

/* Responsive */
@media (max-width: 768px) {
  .charts-grid { grid-template-columns: 1fr; }
  .nav-links { display: none; }
  .container { padding: 16px; }
  .stat-card .stat-value { font-size: 1.4rem; }
  .auth-card { padding: 32px 24px; margin: 16px; }
  .upload-zone { padding: 32px 16px; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease; }

/* Mobile nav */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 8px 0; }
.mobile-nav-inner { display: flex; justify-content: space-around; }
.mobile-nav button { background: none; border: none; cursor: pointer; padding: 6px 12px; font-family: var(--font); font-size: 0.7rem; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 2px; }
.mobile-nav button.active { color: var(--accent); }
.mobile-nav button .mnav-icon { font-size: 1.3rem; }
@media (max-width: 768px) { .mobile-nav { display: block; } body { padding-bottom: 70px; } }
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ─── State ─── */
let token = localStorage.getItem('pulse_token');
let currentUser = null;
let currentPage = 'dashboard';

/* ─── API ─── */
async function api(path, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  if (opts.body && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(path, { ...opts, headers });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Request failed' }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

function logout() { token = null; currentUser = null; localStorage.removeItem('pulse_token'); render(); }
function $(sel, el) { return (el || document).querySelector(sel); }
function $$(sel, el) { return (el || document).querySelectorAll(sel); }

function money(n, showSign) {
  const abs = Math.abs(n);
  const f = abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (showSign && n > 0) return '+$' + f;
  if (n < 0) return '-$' + f;
  return '$' + f;
}

function shortDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function catClass(cat) { return 'cat-' + cat.replace(/[^a-zA-Z]/g, ''); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ─── Render ─── */
function render() {
  const app = document.getElementById('app');
  if (!token) { renderAuth(app); }
  else if (!currentUser) {
    app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-muted)">Loading...</div>';
    loadUser();
  } else { renderApp(app); }
}

async function loadUser() {
  try { currentUser = await api('/api/auth/me'); render(); }
  catch { logout(); }
}

/* ─── Auth ─── */
let authMode = 'login';
function renderAuth(app) {
  app.innerHTML = `
    <div class="auth-page">
      <div class="auth-card fade-in">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v20M2 12h20M5.5 5.5l13 13M18.5 5.5l-13 13"/></svg>
          <span style="font-weight:700;font-size:1.3rem;color:var(--accent);letter-spacing:-0.5px">Pulse</span>
        </div>
        <h1>${authMode === 'login' ? 'Welcome back' : 'Create account'}</h1>
        <p class="subtitle">${authMode === 'login' ? 'Sign in to your finance dashboard' : 'Start tracking your finances'}</p>
        <div id="auth-error" class="auth-error" style="display:none"></div>
        ${authMode === 'register' ? '<label>Display Name</label><input type="text" id="auth-display" placeholder="Your name"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com">' : ''}
        <label>Username</label>
        <input type="text" id="auth-user" placeholder="username">
        <label>Password</label>
        <input type="password" id="auth-pass" placeholder="password" onkeydown="if(event.key==='Enter')doAuth()">
        <button class="btn-primary" onclick="doAuth()" style="width:100%;margin-top:8px">${authMode === 'login' ? 'Sign In' : 'Create Account'}</button>
        <div class="toggle">
          ${authMode === 'login'
            ? "Don't have an account? <a onclick=\"authMode='register';render()\">Sign up</a>"
            : 'Already have an account? <a onclick="authMode=\'login\';render()">Sign in</a>'}
        </div>
      </div>
    </div>`;
  setTimeout(() => { const u = $('#auth-user'); if (u) u.focus(); }, 50);
}

async function doAuth() {
  const errEl = $('#auth-error');
  errEl.style.display = 'none';
  try {
    if (authMode === 'register') {
      await api('/api/auth/register', { method: 'POST', body: {
        username: $('#auth-user').value, email: $('#auth-email').value,
        password: $('#auth-pass').value, display_name: $('#auth-display').value,
      }});
      authMode = 'login';
    }
    const data = await api('/api/auth/login', { method: 'POST', body: {
      username: $('#auth-user').value, password: $('#auth-pass').value
    }});
    token = data.access_token;
    localStorage.setItem('pulse_token', token);
    currentUser = null;
    render();
  } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; }
}

/* ─── App Shell ─── */
const PAGES = [
  { key: 'dashboard', label: 'Dashboard', icon: '\u229e' },
  { key: 'transactions', label: 'Transactions', icon: '\u2195' },
  { key: 'upload', label: 'Upload', icon: '\u2191' },
  { key: 'accounts', label: 'Accounts', icon: '\u25ce' },
  { key: 'subscriptions', label: 'Subscriptions', icon: '\u21bb' },
];

function renderApp(app) {
  app.innerHTML = `
    <nav>
      <div class="nav-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v20M2 12h20M5.5 5.5l13 13M18.5 5.5l-13 13"/></svg>
        Pulse
      </div>
      <div class="nav-links">
        ${PAGES.map(p => '<button data-page="' + p.key + '" class="' + (currentPage === p.key ? 'active' : '') + '" onclick="navigate(\'' + p.key + '\')">' + p.label + '</button>').join('')}
      </div>
      <div class="nav-right">
        <span class="nav-user">${esc(currentUser.display_name || currentUser.username)}</span>
        <button class="btn-logout" onclick="logout()">Sign Out</button>
      </div>
    </nav>
    <div class="container fade-in" id="page-content"></div>
    <div class="mobile-nav"><div class="mobile-nav-inner">
      ${PAGES.map(p => '<button data-page="' + p.key + '" class="' + (currentPage === p.key ? 'active' : '') + '" onclick="navigate(\'' + p.key + '\')"><span class="mnav-icon">' + p.icon + '</span>' + p.label + '</button>').join('')}
    </div></div>`;
  renderPage();
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('[data-page]').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });
  renderPage();
}

async function renderPage() {
  const el = document.getElementById('page-content');
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted)">Loading...</div>';
  try {
    switch (currentPage) {
      case 'dashboard': await renderDashboard(el); break;
      case 'transactions': await renderTransactions(el); break;
      case 'upload': await renderUpload(el); break;
      case 'accounts': await renderAccounts(el); break;
      case 'subscriptions': await renderSubscriptions(el); break;
    }
  } catch (e) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">!</div><h3>Error</h3><p>' + esc(e.message) + '</p></div>';
  }
}

/* ─── Dashboard ─── */
async function renderDashboard(el) {
  const [overview, categories, trend] = await Promise.all([
    api('/api/analytics/overview'),
    api('/api/analytics/spending-by-category?months=1'),
    api('/api/analytics/monthly-trend?months=6'),
  ]);
  const m = overview.this_month;
  const pm = overview.last_month;
  const incChange = pm.income > 0 ? ((m.income - pm.income) / pm.income * 100).toFixed(0) : null;
  const expChange = pm.expenses > 0 ? ((m.expenses - pm.expenses) / pm.expenses * 100).toFixed(0) : null;

  el.innerHTML = `
    <div class="page-header"><h2>Dashboard</h2><span style="font-size:0.85rem;color:var(--text-muted)">${new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</span></div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Income this month</div>
        <div class="stat-value stat-positive">${money(m.income)}</div>
        <div class="stat-sub">${incChange !== null ? (incChange >= 0 ? '+' : '') + incChange + '% vs last month' : 'No prior data'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expenses this month</div>
        <div class="stat-value stat-negative">${money(m.expenses)}</div>
        <div class="stat-sub">${expChange !== null ? (expChange >= 0 ? '+' : '') + expChange + '% vs last month' : 'No prior data'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Net this month</div>
        <div class="stat-value ${m.net >= 0 ? 'stat-positive' : 'stat-negative'}">${money(m.net, true)}</div>
        <div class="stat-sub">${m.txn_count} transactions</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Balance</div>
        <div class="stat-value stat-neutral">${money(overview.total_balance)}</div>
        <div class="stat-sub">${overview.account_count} account${overview.account_count !== 1 ? 's' : ''}</div>
      </div>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Spending by Category</h3>
        <div id="cat-chart" class="bar-chart"></div>
        ${categories.length === 0 ? '<div class="empty-state" style="padding:20px"><p>No spending data yet</p></div>' : ''}
      </div>
      <div class="chart-card">
        <h3>Monthly Trend</h3>
        <div id="trend-chart"></div>
        ${trend.length === 0 ? '<div class="empty-state" style="padding:20px"><p>No data yet</p></div>' : ''}
      </div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px;font-size:0.95rem;font-weight:600">All-Time Summary</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px">
        <div><span style="font-size:0.82rem;color:var(--text-muted)">Total Income</span><div style="font-family:var(--mono);font-weight:600;font-size:1.1rem;color:var(--accent)">${money(overview.all_time.income)}</div></div>
        <div><span style="font-size:0.82rem;color:var(--text-muted)">Total Expenses</span><div style="font-family:var(--mono);font-weight:600;font-size:1.1rem;color:var(--red)">${money(overview.all_time.expenses)}</div></div>
        <div><span style="font-size:0.82rem;color:var(--text-muted)">Net All-Time</span><div style="font-family:var(--mono);font-weight:600;font-size:1.1rem;color:${overview.all_time.net >= 0 ? 'var(--accent)' : 'var(--red)'}">${money(overview.all_time.net, true)}</div></div>
        <div><span style="font-size:0.82rem;color:var(--text-muted)">Total Transactions</span><div style="font-family:var(--mono);font-weight:600;font-size:1.1rem">${overview.all_time.txn_count.toLocaleString()}</div></div>
      </div>
    </div>`;

  // Category bars
  if (categories.length > 0) {
    const maxCat = Math.max(...categories.map(c => c.total));
    document.getElementById('cat-chart').innerHTML = categories.slice(0, 8).map(c =>
      '<div class="bar-row"><div class="bar-label">' + esc(c.category) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + (c.total / maxCat * 100).toFixed(1) + '%;background:var(--accent)"></div></div><div class="bar-value">' + money(c.total) + '</div></div>'
    ).join('');
  }

  // Trend
  if (trend.length > 0) {
    const maxT = Math.max(...trend.map(t => Math.max(t.income, t.expenses)));
    const mos = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('trend-chart').innerHTML =
      '<div style="display:flex;flex-direction:column;gap:10px">' + trend.map(t =>
        '<div><div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:4px">' + mos[t.month] + ' ' + t.year + '</div>' +
        '<div style="display:flex;gap:6px;align-items:center"><div style="flex:1;display:flex;gap:3px">' +
        '<div style="height:18px;border-radius:3px;background:var(--accent);width:' + (maxT > 0 ? (t.income / maxT * 100).toFixed(1) : 0) + '%;transition:width 0.5s"></div>' +
        '<div style="height:18px;border-radius:3px;background:var(--red);opacity:0.7;width:' + (maxT > 0 ? (t.expenses / maxT * 100).toFixed(1) : 0) + '%;transition:width 0.5s"></div>' +
        '</div><span style="font-size:0.75rem;font-family:var(--mono);color:' + (t.net >= 0 ? 'var(--accent)' : 'var(--red)') + ';width:70px;text-align:right">' + money(t.net, true) + '</span></div></div>'
      ).join('') + '</div>' +
      '<div style="display:flex;gap:16px;margin-top:12px;font-size:0.75rem;color:var(--text-muted)">' +
      '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--accent);margin-right:4px"></span>Income</span>' +
      '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--red);opacity:0.7;margin-right:4px"></span>Expenses</span></div>';
  }
}

/* ─── Transactions ─── */
let txnFilters = { search: '', category: '', date_from: '', date_to: '' };
async function renderTransactions(el) {
  let url = '/api/transactions/?limit=200';
  if (txnFilters.search) url += '&search=' + encodeURIComponent(txnFilters.search);
  if (txnFilters.category) url += '&category=' + encodeURIComponent(txnFilters.category);
  if (txnFilters.date_from) url += '&date_from=' + txnFilters.date_from;
  if (txnFilters.date_to) url += '&date_to=' + txnFilters.date_to;

  const [txns, cats] = await Promise.all([api(url), api('/api/transactions/categories')]);
  const catOpts = cats.map(c => c.category).sort();

  el.innerHTML = `
    <div class="page-header">
      <h2>Transactions</h2>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary btn-sm" onclick="navigate('upload')">\u2191 Import</button>
        <button class="btn-primary btn-sm" onclick="showAddTransaction()">+ Add</button>
      </div>
    </div>
    <div class="filters">
      <input type="text" placeholder="Search..." value="${esc(txnFilters.search)}" onchange="txnFilters.search=this.value;renderPage()" style="width:200px">
      <select onchange="txnFilters.category=this.value;renderPage()">
        <option value="">All Categories</option>
        ${catOpts.map(c => '<option value="' + esc(c) + '"' + (txnFilters.category === c ? ' selected' : '') + '>' + esc(c) + '</option>').join('')}
      </select>
      <input type="date" value="${txnFilters.date_from}" onchange="txnFilters.date_from=this.value;renderPage()">
      <input type="date" value="${txnFilters.date_to}" onchange="txnFilters.date_to=this.value;renderPage()">
      ${Object.values(txnFilters).some(v => v) ? '<button class="btn-secondary btn-sm" onclick="txnFilters={search:\'\',category:\'\',date_from:\'\',date_to:\'\'};renderPage()">Clear</button>' : ''}
    </div>
    ${txns.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">\u2195</div>
        <h3>No transactions yet</h3>
        <p>Upload a bank statement or add transactions manually to get started.</p>
        <button class="btn-primary" onclick="navigate('upload')">Upload Statement</button>
      </div>` : `
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrap"><table>
          <thead><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right">Amount</th><th>Source</th><th></th></tr></thead>
          <tbody>${txns.map(t => '<tr>' +
            '<td style="white-space:nowrap;font-size:0.85rem">' + shortDate(t.date) + '</td>' +
            '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(t.description) + '</td>' +
            '<td><span class="category-tag ' + catClass(t.category) + '">' + esc(t.category) + '</span></td>' +
            '<td style="text-align:right" class="' + (t.amount >= 0 ? 'amount-positive' : 'amount-negative') + '">' + money(t.amount) + '</td>' +
            '<td style="font-size:0.8rem;color:var(--text-muted)">' + t.source + '</td>' +
            '<td><button class="btn-danger btn-sm" onclick="deleteTxn(' + t.id + ')" style="opacity:0.6;font-size:0.75rem">\u00d7</button></td>' +
            '</tr>').join('')}</tbody>
        </table></div>
      </div>
      <div style="text-align:center;padding:12px;font-size:0.82rem;color:var(--text-muted)">${txns.length} transaction${txns.length !== 1 ? 's' : ''}</div>`}`;
}

async function deleteTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  await api('/api/transactions/' + id, { method: 'DELETE' });
  renderPage();
}

function showAddTransaction() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal fade-in">
      <h3>Add Transaction</h3>
      <label>Date</label><input type="date" id="txn-date" value="${new Date().toISOString().split('T')[0]}">
      <label>Description</label><input type="text" id="txn-desc" placeholder="e.g. Starbucks">
      <label>Amount (negative for expense)</label><input type="number" id="txn-amount" step="0.01" placeholder="-4.50">
      <label>Category</label>
      <select id="txn-cat"><option>Uncategorized</option><option>Groceries</option><option>Dining</option><option>Shopping</option><option>Subscriptions</option><option>Utilities</option><option>Housing</option><option>Transport</option><option>Entertainment</option><option>Health</option><option>Insurance</option><option>Gas &amp; Auto</option><option>Income</option><option>Transfer</option></select>
      <label>Notes (optional)</label><input type="text" id="txn-notes" placeholder="">
      <div class="modal-actions">
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn-primary" onclick="saveTransaction()">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => $('#txn-desc').focus(), 50);
}

async function saveTransaction() {
  try {
    await api('/api/transactions/', { method: 'POST', body: {
      date: $('#txn-date').value, description: $('#txn-desc').value,
      amount: parseFloat($('#txn-amount').value), category: $('#txn-cat').value, notes: $('#txn-notes').value,
    }});
    $('.modal-overlay').remove();
    renderPage();
  } catch (e) { alert(e.message); }
}

/* ─── Upload ─── */
async function renderUpload(el) {
  const [history, accounts] = await Promise.all([api('/api/upload/history'), api('/api/accounts/')]);
  el.innerHTML = `
    <div class="page-header"><h2>Upload Statement</h2></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div class="upload-zone" onclick="document.getElementById('csv-input').click()"
           ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')"
           ondrop="event.preventDefault();this.classList.remove('dragover');handleDrop(event,'csv')">
        <div class="upload-icon">\ud83d\udcc4</div>
        <p><strong>CSV Statement</strong></p>
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px">Bank exports, credit card CSVs</p>
        <div class="upload-formats">Supports most bank CSV formats</div>
        <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="uploadFile(this.files[0],'csv')">
      </div>
      <div class="upload-zone" onclick="document.getElementById('pdf-input').click()"
           ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')"
           ondrop="event.preventDefault();this.classList.remove('dragover');handleDrop(event,'pdf')">
        <div class="upload-icon">\ud83d\udcd1</div>
        <p><strong>PDF Statement</strong></p>
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px">Bank &amp; credit card PDFs</p>
        <div class="upload-formats">Best-effort extraction</div>
        <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="uploadFile(this.files[0],'pdf')">
      </div>
    </div>
    ${accounts.length > 0 ? '<div style="margin-bottom:24px"><label style="font-size:0.85rem;color:var(--text-secondary)">Link to account (optional):</label><select id="upload-account" style="padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);margin-left:8px"><option value="">None</option>' + accounts.map(a => '<option value="' + a.id + '">' + esc(a.name) + '</option>').join('') + '</select></div>' : ''}
    <div id="upload-status" style="margin-bottom:24px"></div>
    ${history.length > 0 ? `
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border)"><h3 style="font-size:0.95rem;font-weight:600">Upload History</h3></div>
        <table><thead><tr><th>File</th><th>Type</th><th>Transactions</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${history.map(u => '<tr><td style="font-size:0.88rem">' + esc(u.filename) + '</td><td><span class="category-tag">' + u.file_type.toUpperCase() + '</span></td><td>' + u.row_count + '</td><td><span style="color:' + (u.status === 'processed' ? 'var(--accent)' : 'var(--red)') + '">' + u.status + '</span></td><td style="font-size:0.82rem;color:var(--text-muted)">' + new Date(u.created_at).toLocaleDateString() + '</td></tr>').join('')}</tbody></table>
      </div>` : ''}`;
}

function handleDrop(e, type) { const f = e.dataTransfer.files[0]; if (f) uploadFile(f, type); }

async function uploadFile(file, type) {
  const status = document.getElementById('upload-status');
  status.innerHTML = '<div class="card" style="background:var(--blue-light);border-color:var(--blue)"><p style="color:var(--blue)">Uploading ' + esc(file.name) + '...</p></div>';
  const form = new FormData();
  form.append('file', file);
  const acctSel = document.getElementById('upload-account');
  if (acctSel && acctSel.value) form.append('account_id', acctSel.value);
  try {
    const result = await api('/api/upload/' + type, { method: 'POST', body: form });
    if (result.status === 'processed') {
      status.innerHTML = '<div class="card" style="background:var(--accent-light);border-color:var(--accent)"><p style="color:var(--accent);font-weight:600">Imported ' + result.row_count + ' transactions from ' + esc(file.name) + '</p>' + (result.error_message ? '<p style="font-size:0.82rem;color:var(--amber);margin-top:8px">' + esc(result.error_message) + '</p>' : '') + '</div>';
    } else {
      status.innerHTML = '<div class="card" style="background:var(--red-light);border-color:var(--red)"><p style="color:var(--red);font-weight:600">Upload failed</p><p style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px">' + esc(result.error_message || 'Unknown error') + '</p></div>';
    }
  } catch (e) { status.innerHTML = '<div class="card" style="background:var(--red-light);border-color:var(--red)"><p style="color:var(--red)">' + esc(e.message) + '</p></div>'; }
}

/* ─── Accounts ─── */
async function renderAccounts(el) {
  const accounts = await api('/api/accounts/');
  const total = accounts.reduce((s, a) => s + a.balance, 0);
  const icons = { checking: '\ud83c\udfe6', savings: '\ud83d\udcb0', credit_card: '\ud83d\udcb3', investment: '\ud83d\udcc8', cash: '\ud83d\udcb5' };
  el.innerHTML = `
    <div class="page-header"><h2>Accounts</h2><button class="btn-primary btn-sm" onclick="showAddAccount()">+ Add Account</button></div>
    ${accounts.length === 0 ? '<div class="empty-state"><div class="empty-icon">\u25ce</div><h3>No accounts yet</h3><p>Add your bank accounts, credit cards, and other financial accounts.</p><button class="btn-primary" onclick="showAddAccount()">Add Account</button></div>' : `
      <div class="stat-card" style="margin-bottom:20px">
        <div class="stat-label">Total Balance</div>
        <div class="stat-value ${total >= 0 ? 'stat-positive' : 'stat-negative'}">${money(total)}</div>
        <div class="stat-sub">${accounts.length} account${accounts.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="accounts-grid">${accounts.map(a =>
        '<div class="account-card"><div class="acct-type">' + (icons[a.account_type] || '\u25ce') + ' ' + a.account_type.replace('_', ' ') + '</div><div class="acct-name">' + esc(a.name) + '</div><div class="acct-inst">' + (esc(a.institution) || 'No institution') + '</div><div class="acct-balance ' + (a.balance >= 0 ? 'stat-positive' : 'stat-negative') + '">' + money(a.balance) + '</div></div>'
      ).join('')}</div>`}`;
}

function showAddAccount() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal fade-in">
      <h3>Add Account</h3>
      <label>Account Name</label><input type="text" id="acct-name" placeholder="e.g. Chase Checking">
      <label>Type</label><select id="acct-type"><option value="checking">Checking</option><option value="savings">Savings</option><option value="credit_card">Credit Card</option><option value="investment">Investment</option><option value="cash">Cash</option></select>
      <label>Institution</label><input type="text" id="acct-inst" placeholder="e.g. Chase, Bank of America">
      <label>Current Balance</label><input type="number" id="acct-bal" step="0.01" value="0">
      <div class="modal-actions">
        <button class="btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn-primary" onclick="saveAccount()">Save</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => $('#acct-name').focus(), 50);
}

async function saveAccount() {
  try {
    await api('/api/accounts/', { method: 'POST', body: {
      name: $('#acct-name').value, account_type: $('#acct-type').value,
      institution: $('#acct-inst').value, balance: parseFloat($('#acct-bal').value) || 0,
    }});
    $('.modal-overlay').remove();
    renderPage();
  } catch (e) { alert(e.message); }
}

/* ─── Subscriptions ─── */
async function renderSubscriptions(el) {
  const data = await api('/api/analytics/subscriptions');
  el.innerHTML = `
    <div class="page-header"><h2>Subscriptions</h2></div>
    ${data.subscriptions.length === 0 ? '<div class="empty-state"><div class="empty-icon">\u21bb</div><h3>No subscriptions detected</h3><p>Upload at least 2-3 months of statements and recurring charges will be automatically detected.</p></div>' : `
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card"><div class="stat-label">Monthly Total</div><div class="stat-value stat-negative">${money(data.total_monthly)}</div><div class="stat-sub">${data.subscriptions.length} subscription${data.subscriptions.length !== 1 ? 's' : ''}</div></div>
        <div class="stat-card"><div class="stat-label">Yearly Estimate</div><div class="stat-value stat-negative">${money(data.total_yearly)}</div><div class="stat-sub">Based on current subscriptions</div></div>
      </div>
      <div class="sub-grid">${data.subscriptions.map(s =>
        '<div class="sub-card"><div class="sub-info"><h4>' + esc(s.description) + '</h4><p><span class="category-tag ' + catClass(s.category) + '">' + esc(s.category) + '</span> &middot; ' + s.occurrences + ' charges</p><p>Last: ' + shortDate(s.last_seen) + '</p></div><div class="sub-amount">' + money(s.avg_amount) + '<span style="font-size:0.7rem;color:var(--text-muted)">/mo</span></div></div>'
      ).join('')}</div>`}`;
}

/* ─── Init ─── */
render();
</script>
</body>
</html>
